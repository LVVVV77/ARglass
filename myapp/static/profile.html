<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>完善个人资料 - AR运动表现系统</title>
    <style>
        :root { 
            --primary: #2196f3; 
            --dark: #2c3e50; 
            --accent: #00e5ff;
            --success: #4caf50;
            --bg-glass: rgba(255, 255, 255, 0.9);
        }
        
        body { 
            font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; 
            background: radial-gradient(circle at top right, #e0eafc, #cfdef3); 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card { 
            background: var(--bg-glass); 
            width: 500px; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        .header { text-align: center; margin-bottom: 25px; }
        .avatar-box { 
            width: 70px; height: 70px; background: white; 
            border-radius: 50%; margin: 0 auto 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; border: 3px solid var(--primary);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.2);
        }
        
        .form-group { margin-bottom: 18px; position: relative; }
        label { display: block; font-size: 11px; color: #546e7a; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 12px 16px; border: 1.5px solid #e0e7ff; 
            border-radius: 12px; box-sizing: border-box; outline: none; 
            font-size: 14px; transition: all 0.3s; background: rgba(255,255,255,0.8);
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.1);
            background: #fff;
        }
        
        .row { display: flex; gap: 15px; }
        .code-row { display: flex; gap: 10px; position: relative; }
        
        #customProjectArea { margin-top: 10px; display: none; animation: fadeIn 0.4s; }
        
        .btn-code { 
            width: 130px; background: var(--dark); color: white; border: none; 
            border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 500;
            transition: 0.3s; flex-shrink: 0; position: relative;
        }
        .btn-code:hover:not(:disabled) { background: #34495e; transform: translateY(-1px); }
        .btn-code:disabled { opacity: 0.7; cursor: not-allowed; background: #95a5a6; }

        #codeTips {
            position: absolute; right: 0; top: -25px; font-size: 11px;
            color: var(--success); font-weight: bold; opacity: 0;
            transition: 0.4s; pointer-events: none;
        }

        .btn-confirm { 
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--primary), #1565c0); 
            color: white; border: none; border-radius: 16px; font-size: 15px; 
            font-weight: bold; cursor: pointer; margin-top: 10px; 
            box-shadow: 0 8px 20px rgba(33, 150, 243, 0.3); 
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(33, 150, 243, 0.4); }
        .btn-confirm::after { content: '→'; font-size: 18px; transition: 0.3s; }
        .btn-confirm:hover::after { transform: translateX(5px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="avatar-box">👤</div>
        <h2 style="margin:0; color:var(--dark); letter-spacing: 1px; font-size: 22px;">完善训练档案</h2>
        <p style="font-size: 12px; color: #78909c; margin-top: 6px;">您的数据将被用于生成 AI 表现分析报告</p>
    </div>

    <form id="profileForm">
        <div class="row">
            <div class="form-group" style="flex:1.2;">
                <label>姓名 / 运动员代号</label>
                <input type="text" id="usernameInput" placeholder="请输入姓名" required>
            </div>
            <div class="form-group" style="flex:0.8;">
                <label>性别</label>
                <select id="genderSelect">
                    <option value="male">男 (M)</option>
                    <option value="female">女 (F)</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="form-group" style="flex:1;">
                <label>联系电话</label>
                <input type="text" id="phoneInput" placeholder="11位手机号" maxlength="11">
            </div>
            <div class="form-group" style="flex:1;">
                <label>电子邮箱</label>
                <input type="email" id="emailInput" placeholder="example@mail.com">
            </div>
        </div>

        <div class="form-group">
            <label>身份证号 (用于建立加密档案)</label>
            <input type="text" id="idCardInput" placeholder="请输入18位身份证号" maxlength="18">
        </div>

        <div class="row">
            <div class="form-group" style="flex:1;">
                <label>身高 (cm)</label>
                <input type="number" id="heightInput" placeholder="175">
            </div>
            <div class="form-group" style="flex:1;">
                <label>体重 (kg)</label>
                <input type="number" id="weightInput" placeholder="65">
            </div>
        </div>

        <div class="form-group">
            <label>专项训练项目 (AI 视觉追踪基准)</label>
            <select id="training_goal" onchange="toggleCustomProject(this)" required>
                <option value="" disabled selected>请选择您的专项项目</option>
                <option value="跳远性能提升">专项：跳远性能提升</option>
                <option value="投篮稳定性">专项：投篮稳定性</option>
                <option value="综合体能训练">综合体能训练</option>
                <option value="custom">-- 自定义其他项目 --</option>
            </select>
            <div id="customProjectArea">
                <input type="text" id="customInput" placeholder="请输入您的自定义训练项目">
            </div>
        </div>

        <div class="form-group">
            <label>安全校验码</label>
            <div class="code-row">
                <div id="codeTips">✓ 发送成功，请查收短信</div>
                <input type="text" id="verifyCode" placeholder="核验码:" maxlength="6">
                <button type="button" id="sendBtn" class="btn-code" onclick="sendCode()">获取验证码</button>
            </div>
        </div>

        <button type="button" class="btn-confirm" onclick="handleConfirm()">完成信息收录，下一步问卷</button>
    </form>
</div>

<script>
    function toggleCustomProject(select) {
        const area = document.getElementById('customProjectArea');
        area.style.display = (select.value === 'custom') ? 'block' : 'none';
    }

    function sendCode() {
        const phone = document.getElementById('phoneInput').value;
        const btn = document.getElementById('sendBtn');
        const tips = document.getElementById('codeTips');
        
        if (!/^1[3-9]\d{9}$/.test(phone)) {
            alert("请输入有效的11位手机号码");
            return;
        }

        btn.disabled = true;
        btn.innerText = "发送中...";
        
        setTimeout(() => {
            tips.style.opacity = "1";
            setTimeout(() => { tips.style.opacity = "0"; }, 3000);

            let count = 60;
            const timer = setInterval(() => {
                count--; 
                btn.innerText = `${count}S`;
                if (count <= 0) { 
                    clearInterval(timer); 
                    btn.disabled = false; 
                    btn.innerText = "重新获取"; 
                }
            }, 1000);
        }, 800);
    }

    async function handleConfirm() {
        const code = document.getElementById('verifyCode').value;
        const phone = document.getElementById('phoneInput').value;
        const name = document.getElementById('usernameInput').value || "精英运动员";
        let goal = document.getElementById('training_goal').value;
        
        if (goal === 'custom') goal = document.getElementById('customInput').value;
        
        // 校验逻辑
        if (!phone) { alert("请填写联系电话"); return; }
        if (!goal) { alert("请选择训练项目"); return; }
        if (code !== '664793') { alert("验证码校验失败"); return; }

        // 直接跳转，不显示动画
        const targetUrl = `survey.html?account=${encodeURIComponent(name)}&sport=${encodeURIComponent(goal)}`;
        window.location.href = targetUrl;
    }
</script>
</body>
</html>
